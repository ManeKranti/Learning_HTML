<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
</head>
<body>
    <h1>Image Example</h1>
    <img src="images/deer.jpg" alt="Deer Image" width="300" height="200"/>
    <img src="images/laptop.png" alt="Laptop Image" width="300" height="200"/>
    <hr>

    <h1>Audio Example</h1>
    <audio controls>
        <source src="Documents/file_example_MP3_700KB.mp3" type="audio/mp3">
    </audio>
    <hr>

    <h1>Video Example</h1>
    <video controls width="300" height="200">
        <source src="Documents/file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>
    <hr>

    <h1>IFrame Example</h1>
    <iframe src="https://www.flipkart.com/" width="500" height="500"></iframe>
    <hr>

    <h1>Input Types</h1>
    <form>
        Name : <input type="text"><br><br>
        Password : <input type="password"><br><br>
        Email : <input type="email"><br><br>
        Age : <input type="number"><br><br>
        Date : <input type="date"><br><br>
        Gender : <input type="radio"> Male <input type="radio"> Female<br><br>
        Hobbies : <input type="checkbox"> Reading <input type="checkbox"> Sports <br><br>
        Upload File : <input type="file"><br><br>
        <input type="submit">
        <input type="reset"><br><br>
    </form>
 
    
</body>
</html>
