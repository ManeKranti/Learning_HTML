<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Marquee  -->

    <marquee bgcolor="red">
        <h1>Welcome</h1>
    </marquee> 

    <marquee bgcolor="red" direction="right">
        <h1>Welcome</h1>
    </marquee> 

    <marquee bgcolor="yellow" direction="down">
        <h1>Welcome</h1>
    </marquee> 

    <marquee bgcolor="red" behavior="alternate">
        <h1>Welcome</h1>
    </marquee> 

    <marquee bgcolor="yellow" scrollamount="80">
        <h1>Welcome</h1>
    </marquee> 

    <marquee bgcolor="yellow" scrolldelay="500">
        <h1>Welcome</h1>
    </marquee>






</body>
</html>
