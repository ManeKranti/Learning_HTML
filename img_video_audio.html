<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Video</title>
</head>
<body>
    <!-- Audio Example -->
    <audio controls>
        <source src="Documents/file_example_MP3_700KB.mp3" type="audio/mp3"/>
    </audio>
    <hr>

    <!-- Video Example -->
    <video controls>
        <source src="Documents/file_example_MP4_640_3MG.mp4" type="video/mp4"/>
    </video>
    <hr>


    <!-- Image Example -->
    <h1>Image Example</h1>
    <img src="images/deer.jpg" alt="Deer Image"/>                                          

    <picture>
        <img src="images/laptop.png" alt="Laptop Image"/>
    </picture>

    <figure>
        <img src="images/html.webp" alt="HTML Image"/>    
    </figure>
    
</body>
</html>
