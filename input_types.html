<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Types</title>
</head>
<body>
    <!-- Input Types -->
     <label>Enter Your Name</label>
     <input type="text" placeholder="Enter your name"/><br><br>

     <label>Enter Your Email</label>
     <input type="email" placeholder="Enter your email"/><br><br>

     <label>Enter Your Password</label>
     <input type="password" placeholder="Enter your password"/><br><br>

     <label>Enter Your Phone number</label>
     <input type="number" placeholder="Enter your phone number"/><br><br>

     <label>Enter Date</label>
     <input type="date"/>

     <label>Enter Month</label>
     <input type="month"/>

     <label>Enter Week</label>
     <input type="week"/>

     <label>Enter Time</label>
     <input type="time"/>

     <label>Date & Time</label>
     <input type="datetime-local"/><br><br>

     <label>Choose City</label>
     <input type="checkbox" checked/>Mumbai
     <input type="checkbox"/>Pune
     <input type="checkbox"/>Nashik
     <input type="checkbox"/>Jalgaon<br><br>

     <label>Select Gender</label>
     <input type="radio" name="gender">Male
     <input type="radio" name="gender">Female
     <input type="radio" name="gender">Other<br><br>

     <label>Select Color</label>
     <input type="color"><br><br>

     <label>Select Range</label>
     <input type="range"><br><br>

     <label>Upload your photo</label>
     <input type="file"><br><br>

     <label>Upload Your Photo</label>
     <input type="file" multiple><br><br>

     <label>Select Fav Dish</label>
     <select>
        <option>Choose....</option>
        <option>Puran Poli</option>
        <option>Chicken Biryani</option>
        <option>Pizza</option>
        <option>Manchurian</option>
        <option>Aamras Poli</option>
        <option>Noodels</option>
     </select><br><br>

     <label>Enter Address</label>
     <textarea rows="5" cols="40"></textarea><br><br>

     <label>Search</label>
     <input type="search"><br><br>

     <label>For Link</label>
     <input type="url"><br><br>

     <input type="submit" value="Submit">
     <input type="button" value="Submit">

     <input type="reset" value="Reset">
</body>
</html>
